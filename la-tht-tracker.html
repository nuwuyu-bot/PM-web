<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA · THT 合作管理平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--navy-mid:#1a3560;
  --red:#c0392b;
  --text:#1a1a1a;--text-sec:#555;--text-muted:#888;
  --border:#e5e5e5;--border-strong:#ccc;
  --bg:#fff;--surface:#fafafa;--surface2:#f4f4f4;
  --pass-bg:#edf7f1;--pass-txt:#1a6b3a;
  --fail-bg:#fdf0f0;--fail-txt:#c0392b;
  --pend-bg:#fdf6e3;--pend-txt:#8a5c00;
  --radius:6px;
}
body{font-family:'Microsoft JhengHei','PingFang TC','Segoe UI',system-ui,sans-serif;font-size:13px;color:var(--text);background:#fff;min-height:100vh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-wrap{display:flex;width:700px;min-height:380px;border-radius:8px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.45)}
.login-left{flex:1;background:#162947;padding:48px 40px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.login-left::after{content:'LA';position:absolute;right:-10px;bottom:-30px;font-size:160px;font-weight:800;color:rgba(255,255,255,.04);pointer-events:none}
.login-logo-row{display:flex;align-items:center;gap:12px}
.login-logo-box{width:42px;height:42px;background:var(--red);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.login-brand{color:#fff;font-size:18px;font-weight:600}
.login-brand span{display:block;font-size:11px;font-weight:400;color:rgba(255,255,255,.45);margin-top:2px}
.login-tagline{color:rgba(255,255,255,.5);font-size:12px;line-height:1.8;margin-top:28px}
.login-footer{font-size:11px;color:rgba(255,255,255,.25)}
.login-right{width:290px;background:#fff;padding:44px 32px;display:flex;flex-direction:column;justify-content:center}
.login-right h2{font-size:16px;font-weight:600;margin-bottom:4px}
.login-right .sub{font-size:12px;color:var(--text-muted);margin-bottom:24px}
.login-right label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.login-right input{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:var(--radius);font-size:13px;outline:none;margin-bottom:14px}
.login-right input:focus{border-color:var(--navy)}
.login-right button{width:100%;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer}
.login-err{color:var(--red);font-size:11px;margin-top:8px;display:none}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--navy);padding:0 28px;position:sticky;top:0;z-index:200}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;height:52px}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-logo{width:34px;height:34px;background:var(--red);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.tb-brand{font-size:14px;font-weight:600;color:#fff;letter-spacing:.03em}
.tb-brand span{color:rgba(255,255,255,.4);font-weight:400;margin:0 5px}
.tb-divider{width:1px;height:16px;background:rgba(255,255,255,.2)}
.tb-project{font-size:12px;color:rgba(255,255,255,.55)}
.tb-meta{font-size:11px;color:rgba(255,255,255,.35)}

/* NAV */
.nav{border-bottom:1px solid var(--border);background:#fff;display:flex;padding:0 28px}
.nav-tab{padding:12px 16px;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.nav-tab:hover{color:var(--navy)}
.nav-tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--red)}

/* MAIN */
.main{padding:28px;max-width:1140px;margin:0 auto;width:100%}
.loading{text-align:center;padding:60px;color:var(--text-muted);font-size:13px}

/* SECTION LABEL */
.slabel{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--navy);text-transform:uppercase;margin-bottom:14px;border-left:3px solid var(--red);padding-left:8px}

/* KPI CARDS */
.kpi-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.kpi-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.kpi-row-6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:22px}
.kpi{border:1px solid var(--border);border-left:4px solid var(--navy);border-radius:var(--radius);padding:16px 18px;background:#fff}
.kpi-val{font-size:26px;font-weight:700;color:var(--navy);line-height:1}
.kpi-val-sm{font-size:15px;font-weight:600;color:var(--navy);line-height:1.4}
.kpi-label{font-size:10px;font-weight:700;color:var(--text-muted);margin-top:6px;text-transform:uppercase;letter-spacing:.05em}
.kpi-sub{font-size:11px;color:var(--text-sec);margin-top:4px;line-height:1.5}

/* VERDICT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.verdict-box{border:1px solid var(--border);border-left:4px solid var(--navy);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px}
.verdict-box:last-child{margin-bottom:0}
.v-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--navy);text-transform:uppercase;margin-bottom:5px}
.v-val{font-size:13px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:7px}
.v-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.v-dot-warn{background:var(--red)}
.v-dot-ok{background:#1a6b3a}
.v-desc{font-size:11px;color:var(--text-sec);margin-top:6px;line-height:1.6}

/* RISK */
.risk-row{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--text-sec);padding:8px 0;border-bottom:1px solid var(--border)}
.risk-row:last-child{border-bottom:none}
.risk-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--red);color:#fff;white-space:nowrap;margin-top:1px;letter-spacing:.04em}

/* STAGE TIMELINE */
.stage-timeline{display:flex;align-items:flex-start;position:relative;margin-bottom:28px;padding:0 20px}
.stage-timeline::before{content:'';position:absolute;top:19px;left:60px;right:60px;height:2px;background:var(--border);z-index:0}
.stage-item{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;z-index:1}
.stage-circle{width:38px;height:38px;border-radius:50%;border:3px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text-muted);z-index:2}
.stage-circle.done{background:var(--navy);border-color:var(--navy);color:#fff}
.stage-circle.current{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 0 5px rgba(192,57,43,.12)}
.stage-name{font-size:11px;font-weight:600;color:var(--navy);margin-top:8px;text-align:center;line-height:1.4;max-width:110px}
.stage-name.muted{color:var(--text-muted);font-weight:400}
.stage-date{font-size:10px;color:var(--text-muted);margin-top:2px;text-align:center}

/* BADGES */
.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap}
.b-dev{background:#ebf3fb;color:#185fa5}
.b-pilot{background:var(--pend-bg);color:var(--pend-txt)}
.b-mass{background:var(--pass-bg);color:var(--pass-txt)}
.b-blocked{background:var(--fail-bg);color:var(--fail-txt)}
.b-high{background:var(--fail-bg);color:var(--fail-txt)}
.b-normal{background:var(--surface2);color:#555}

/* PRODUCT TABLE */
.prod-group{margin-bottom:28px}
.prod-group-hdr{font-size:12px;font-weight:700;color:#fff;background:var(--navy);padding:9px 14px;border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;justify-content:space-between}
.prod-group-count{font-size:11px;font-weight:400;opacity:.7}
.prod-table{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--border);border-top:none}
.prod-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.prod-table tr:last-child td{border-bottom:none}
.prod-table tr:hover td{background:var(--surface);cursor:pointer}
.prod-table thead td{background:var(--surface2);font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;padding:7px 14px}
.prod-code{font-weight:700;color:var(--navy)}

/* PRODUCT DETAIL OVERLAY */
#prod-detail{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto}
.detail-panel{background:#fff;border-radius:8px;width:100%;max-width:880px;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.detail-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:var(--navy);border-radius:8px 8px 0 0}
.detail-hdr-title{font-size:15px;font-weight:600;color:#fff}
.detail-close{font-size:22px;color:rgba(255,255,255,.5);cursor:pointer;padding:4px 8px;line-height:1}
.detail-close:hover{color:#fff}
.detail-body{display:grid;grid-template-columns:230px 1fr}
.detail-left{padding:20px;border-right:1px solid var(--border)}
.detail-right{padding:20px 24px;overflow-y:auto;max-height:70vh}
.spec-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;gap:8px}
.spec-row:last-child{border-bottom:none}
.spec-k{color:var(--text-muted);flex-shrink:0}
.spec-v{font-weight:500;text-align:right}
.situation-box{margin-top:12px;background:var(--surface2);border-radius:var(--radius);padding:10px 12px;font-size:11px;color:var(--text-sec);line-height:1.6}
.situation-lbl{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.tl-hdr{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px}
.tl-wrap{position:relative;padding-left:18px}
.tl-item{position:relative;padding-bottom:18px;font-size:12px}
.tl-item::before{content:'';position:absolute;left:-14px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--navy);border:2px solid #fff;outline:1.5px solid var(--navy)}
.tl-item::after{content:'';position:absolute;left:-11px;top:12px;bottom:0;width:1px;background:var(--border)}
.tl-item:last-child::after{display:none}
.tl-item.current::before{background:var(--red);outline-color:var(--red)}
.tl-item.pending-st::before{background:#ccc;outline-color:#ccc}
.tl-date{font-size:10px;color:var(--text-muted);margin-bottom:2px}
.tl-event{font-weight:600;color:var(--navy)}
.tl-notes{color:var(--text-sec);margin-top:3px;line-height:1.6;font-size:11px}
.order-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-top:8px}
.order-box-title{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.order-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)}
.order-row:last-child{border-bottom:none}
.order-k{color:var(--text-muted)}
.order-v{font-weight:600}

/* COLLAB LOG */
.log-entry{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
.log-entry:hover .log-title{text-decoration:underline}
.log-date-col{min-width:110px;font-size:12px;font-weight:600;color:var(--navy)}
.log-type-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.log-meta{flex:1}
.log-title{font-size:13px;font-weight:500;margin-bottom:4px}
.log-tags{display:flex;gap:5px;flex-wrap:wrap}
.log-tag{font-size:9px;padding:2px 7px;border:1px solid var(--border);border-radius:4px;color:var(--text-muted)}
.log-arrow{color:var(--text-muted);font-size:16px;flex-shrink:0}

/* MEETING DETAIL OVERLAY */
#meeting-detail{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto}
.meeting-panel{background:#fff;border-radius:8px;width:100%;max-width:760px;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.meeting-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 28px;background:var(--navy);border-radius:8px 8px 0 0}
.meeting-hdr-date{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:4px}
.meeting-hdr-title{font-size:16px;font-weight:600;color:#fff}
.meeting-body{padding:24px 28px;max-height:75vh;overflow-y:auto}
.report-section{margin-bottom:20px}
.report-section h4{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.report-info-row{display:grid;grid-template-columns:110px 1fr;gap:6px;font-size:12px;padding:4px 0}
.report-info-k{color:var(--text-muted)}
.ri-decision{background:#ebf3fb;border-left:3px solid #185fa5;border-radius:var(--radius);padding:9px 12px;margin-bottom:5px;font-size:12px;color:#1f3c6e}
.ri-issue{background:var(--fail-bg);border-left:3px solid var(--red);border-radius:var(--radius);padding:9px 12px;margin-bottom:5px;font-size:12px;color:#7a1a1a}
.ri-followup{background:var(--pend-bg);border-radius:var(--radius);padding:9px 12px;margin-bottom:5px;font-size:12px;color:#5c3d00}
.ri-note{background:var(--surface2);border-radius:var(--radius);padding:9px 12px;margin-bottom:5px;font-size:12px;color:var(--text-sec)}

/* ACTIONS */
.action-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.action-filters{display:flex;gap:5px;flex-wrap:wrap}
.fchip{font-size:10px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text-sec);background:#fff;transition:all .1s}
.fchip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.add-btn{font-size:11px;padding:6px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);cursor:pointer;background:#fff}
.add-btn:hover{background:var(--surface)}
.action-summary-txt{font-size:11px;color:var(--text-muted);margin-bottom:12px}
.action-table{width:100%;border-collapse:collapse;font-size:12px}
.action-table th{font-size:10px;font-weight:600;color:#fff;background:var(--navy);padding:9px 10px;text-align:left;white-space:nowrap}
.action-table th:first-child{border-radius:4px 0 0 0}
.action-table th:last-child{border-radius:0 4px 0 0}
.action-table td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top}
.action-table tr:hover td{background:var(--surface)}
.a-desc{font-weight:500;color:var(--navy);line-height:1.4}
.a-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.a-resp{font-size:10px;color:var(--text-sec);margin-top:3px;line-height:1.5}
.ow-dot{display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--navy);font-size:9px;font-weight:700;text-align:center;line-height:20px;color:#fff;margin-right:4px;vertical-align:middle;flex-shrink:0}
.s-overdue{background:var(--fail-bg);color:var(--fail-txt);font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px}
.s-open{background:var(--surface2);color:#555;font-size:9px;font-weight:600;padding:3px 8px;border-radius:10px}
.s-progress{background:var(--pend-bg);color:var(--pend-txt);font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px}
.s-done{background:var(--pass-bg);color:var(--pass-txt);font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px}
.overdue-date{color:var(--red);font-weight:600}
.done-row td{opacity:.5}
.mark-done-btn{font-size:10px;padding:3px 8px;border:1px solid var(--border-strong);border-radius:4px;cursor:pointer;background:#fff;margin-top:4px}
.mark-done-btn:hover{background:var(--pass-bg);color:var(--pass-txt);border-color:var(--pass-txt)}

/* PARTNER */
.partner-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.ps-block{margin-bottom:22px}
.ps-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--red)}
.info-box{font-size:12px;color:var(--text-sec);line-height:1.8;background:var(--surface);border-radius:var(--radius);padding:14px 16px}
.info-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-k{color:var(--text-muted);min-width:80px;flex-shrink:0}
.info-v{color:var(--text)}
.team-list{display:flex;flex-direction:column;gap:8px}
.member{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.mem-name{font-size:12px;font-weight:600}
.mem-role{font-size:10px;color:var(--text-muted)}
.scope-item{border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--text-sec);margin-bottom:6px}
.scope-item strong{display:block;font-size:11px;font-weight:600;color:var(--navy);margin-bottom:2px}
.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>

<!-- ── LOGIN ────────────────────────────────── -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-left">
      <div>
        <div class="login-logo-row">
          <div class="login-logo-box">LA</div>
          <div class="login-brand">Long Advance <span>合作管理平台</span></div>
        </div>
        <div class="login-tagline" style="margin-top:28px">
          機能性布料開發合作管理<br>
          LA × THT · 9款產品 · 最終客戶：Mammut
        </div>
      </div>
      <div class="login-footer">Long Advance Co., Ltd. · 機密文件 · 2026</div>
    </div>
    <div class="login-right">
      <h2>登入系統</h2>
      <div class="sub">請輸入訪問密碼</div>
      <label>密碼</label>
      <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">進入系統</button>
      <div class="login-err" id="login-err">密碼錯誤，請重新輸入。</div>
    </div>
  </div>
</div>

<!-- ── APP ──────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="tb-left">
        <div class="tb-logo">LA</div>
        <div class="tb-brand">Long Advance <span>×</span> THT</div>
        <div class="tb-divider"></div>
        <div class="tb-project">合作管理平台</div>
      </div>
      <div class="tb-meta">Mammut · 9款產品 · 2026</div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-tab active" onclick="showTab('overview')">總覽</div>
    <div class="nav-tab" onclick="showTab('products')">產品管理</div>
    <div class="nav-tab" onclick="showTab('collab')">合作紀錄</div>
    <div class="nav-tab" onclick="showTab('actions')">行動項目</div>
    <div class="nav-tab" onclick="showTab('partner')">夥伴資訊</div>
  </div>

  <div class="main">

    <!-- ══════════ TAB 1: 總覽 ══════════ -->
    <div id="tab-overview">
      <div id="overview-content"><div class="loading">載入中…</div></div>
    </div>

    <!-- ══════════ TAB 2: 產品管理 ══════════ -->
    <div id="tab-products" style="display:none">
      <div id="products-content"><div class="loading">載入中…</div></div>
    </div>

    <!-- ══════════ TAB 3: 合作紀錄 ══════════ -->
    <div id="tab-collab" style="display:none">
      <div id="collab-content"><div class="loading">載入中…</div></div>
    </div>

    <!-- ══════════ TAB 4: 行動項目 ══════════ -->
    <div id="tab-actions" style="display:none">
      <div id="actions-content"><div class="loading">載入中…</div></div>
    </div>

// ─── CSV PARSER ───────────────────────────────────────────────────
function parseCSV(text) {
  const rows = []; let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
    else if ((ch === '\n' || ch === '\r') && !inQ) {
      row.push(cur.trim()); cur = '';
      if (row.some(c => c)) rows.push(row);
      row = [];
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else cur += ch;
  }
  if (cur || row.length) { row.push(cur.trim()); if (row.some(c=>c)) rows.push(row); }
  return rows;
}

function toObjects(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.replace(/^"|"$/g,'').trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (row[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v));
}

function toKV(text) {
  const rows = parseCSV(text);
  const kv = {};
  rows.forEach(row => {
    const rawKey = (row[0]||'').trim();
    const rawVal = (row[1]||'').trim();
    // Handle multi-line blob cells (Google Sheets exports merged content with \n)
    if (rawKey.includes('\n')) {
      const keys = rawKey.split('\n').map(s => s.trim());
      const vals = rawVal.split('\n').map(s => s.trim());
      keys.forEach((k, i) => {
        const nk = k.replace(/\s+/g, '_');
        if (!nk || nk.startsWith('──') || nk.startsWith('→') || nk === 'Field') return;
        kv[nk] = vals[i] || '';
      });
    } else {
      const k = rawKey.replace(/\s+/g, '_');
      const v = rawVal;
      if (k && !k.startsWith('──') && !k.startsWith('→') && k !== 'Field' && k !== 'field') kv[k] = v;
    }
  });
  return kv;
}

async function fetchSheet(name) {
  try {
    const r = await fetch(BASE_URL + encodeURIComponent(name));
    if (!r.ok) throw new Error(r.status);
    return await r.text();
  } catch(e) { console.warn('Fetch failed:', name, e); return ''; }
}

      </tr></thead>

        ${rows.map((a,i) => {
          const isDone = a._done || a._ns==='done';
          const initials = (a.Owner_Name||'').substring(0,2).toUpperCase()||'—';
          return `<tr class="${isDone?'done-row':''}">
            <td>
              <div class="a-desc">${a.Description||''}</div>
              ${a.Note?`<div class="a-resp" style="font-style:italic">${a.Note}</div>`:''}
            </td>
            <td class="a-sub">${a.Article_Code||'—'}</td>
            <td style="font-size:11px">${a.Requested_By||'—'}</td>
            <td class="a-resp">${a.LA_Responsibility||'—'}</td>
            <td class="a-resp">${a.THT_Responsibility||'—'}</td>
            <td style="font-size:11px"><span class="ow-dot">${initials}</span>${a.Owner_Name||''}</td>
            <td style="font-size:11px" class="${a._ns==='overdue'&&!isDone?'overdue-date':''}">${a.Due_Date||'—'}</td>
            <td>${statusHTML(a)}</td>
            <td></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  document.getElementById('actions-content').innerHTML = html;
}

function markDone(idx){
  actionsData[idx]._done=true;
  renderActions();
}
